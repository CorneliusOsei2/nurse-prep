{% extends "cards/base.html" %}

{% block title %}Delete Card — Prep{% endblock %}

{% block body %}
<div id="app" class="page">
  <header class="page-header">
    <a href="{% url 'manage' %}" class="back-link"><i class="ph-bold ph-caret-left"></i></a>
    <h1 class="page-title">Delete Card</h1>
  </header>

  <div class="delete-confirm">
    <div class="manage-card" style="margin-bottom:20px;">
      <div class="manage-card-header">
        <span class="manage-card-category"><i class="{{ card.category.icon }}"></i> {{ card.category.name }}</span>
      </div>
      <div class="manage-card-question">{{ card.question }}</div>
    </div>

    <p style="color:var(--c-text2);margin-bottom:20px;">Are you sure you want to delete this card? This cannot be undone.</p>

    <form method="post" class="form-actions">
      {% csrf_token %}
      <a href="{% url 'manage' %}" class="btn-secondary">Cancel</a>
      <button type="submit" class="btn-danger">Delete</button>
    </form>
  </div>
</div>
{% endblock %}
