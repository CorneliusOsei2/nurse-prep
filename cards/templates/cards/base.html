<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d9488">
  <meta name="description" content=" Nursing Exam Prep Flashcards">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>{% block title %}Prep{% endblock %}</title>
  <link rel="manifest" href="{% url 'manifest' %}">
  {% load static %}
  <link rel="icon" href="{% static 'cards/icons/icon.svg' %}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{% static 'cards/icons/icon.svg' %}">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="{% static 'cards/css/styles.css' %}?v=13">
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block bottom_nav %}{% endblock %}

  <!-- Global Header -->
  <header class="global-header">
    <div class="global-header-inner">
      <a href="{% url 'dashboard' %}" class="global-logo">
        <span class="global-logo-icon"><i class="ph-bold ph-heartbeat"></i></span>
        <span class="global-logo-text">Prep</span>
      </a>
      <button id="btn-dark-mode-global" class="global-theme-btn" title="Toggle Dark Mode">
        <i class="ph-bold ph-sun" id="dark-icon-global"></i>
      </button>
    </div>
  </header>

  <main class="main-content">
    {% block body %}{% endblock %}
  </main>

  <script>
    (function() {
      const dark = localStorage.getItem('prep_dark') === '1';
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      // Global dark mode toggle
      const btn = document.getElementById('btn-dark-mode-global');
      const icon = document.getElementById('dark-icon-global');
      function setIcon() {
        const d = document.documentElement.getAttribute('data-theme') === 'dark';
        if (icon) icon.className = d ? 'ph-bold ph-moon' : 'ph-bold ph-sun';
      }
      setIcon();
      if (btn) btn.addEventListener('click', function() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        localStorage.setItem('prep_dark', isDark ? '0' : '1');
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        setIcon();
      });
    })();
  </script>
  {% block scripts %}{% endblock %}
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    }
  </script>
</body>
</html>
